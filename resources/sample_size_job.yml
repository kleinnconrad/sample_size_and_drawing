resources:
  jobs:
    cochran_sample_size:
      name: cochran_sample_size_calculation
      max_concurrent_runs: 5
      tasks:
        - task_key: execute_cochran
          notebook_task:
            notebook_path: ../src/cochran.py
            base_parameters:
              catalog: "workspace"
              schema: "default"
              table: "test_population"
              error: "0.05"
              proportion: "0.4"
              confidence: "95"
